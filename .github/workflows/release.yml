name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  # ── macOS (.dmg) ─────────────────────────────────────────────────────────────
  macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Install Python build dependencies
        run: pip install pandas

      - name: Build grocery database
        working-directory: app
        run: python3 scripts/build-grocery-db.py --force

      - name: Build app
        working-directory: app
        run: npx tauri build

      - name: Stage release asset
        run: cp app/src-tauri/target/release/bundle/dmg/*.dmg Monioc.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: Monioc.dmg

  # ── Windows (.exe) ───────────────────────────────────────────────────────────
  windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Install Python build dependencies
        run: pip install pandas

      - name: Build grocery database
        working-directory: app
        run: python3 scripts/build-grocery-db.py --force

      - name: Build app
        working-directory: app
        run: npx tauri build
        env:
          PYTHON: python3

      - name: Stage release asset
        shell: bash
        run: cp app/src-tauri/target/release/bundle/nsis/*.exe Monioc-setup.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: Monioc-setup.exe

  # ── Linux (.AppImage) ────────────────────────────────────────────────────────
  linux:
    name: Build Linux
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Install Python build dependencies
        run: pip install pandas

      - name: Build grocery database
        working-directory: app
        run: python3 scripts/build-grocery-db.py --force

      - name: Build app
        working-directory: app
        run: npx tauri build

      - name: Stage release asset
        run: cp app/src-tauri/target/release/bundle/appimage/*.AppImage monioc.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: monioc.AppImage

  # ── Publish GitHub release ───────────────────────────────────────────────────
  publish:
    name: Publish release
    needs: [macos, windows, linux]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            Monioc.dmg
            Monioc-setup.exe
            monioc.AppImage
