name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  # ── macOS (.dmg) ─────────────────────────────────────────────────────────────
  macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Install Python build dependencies
        run: pip install pandas

      - name: Build grocery database
        working-directory: app
        run: python3 scripts/build-grocery-db.py --force

      - name: Build app
        working-directory: app
        run: npx tauri build
        env:
          # Ad-hoc signing ("-") prevents macOS Gatekeeper from reporting the
          # app as "damaged" when downloaded.  Users will still see an
          # "unidentified developer" prompt the first time they open it;
          # they can bypass it with right-click → Open.
          APPLE_SIGNING_IDENTITY: "-"

      - name: Stage release asset
        run: cp app/src-tauri/target/release/bundle/dmg/*.dmg Monioc.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: Monioc.dmg

  # ── Windows (.exe) ───────────────────────────────────────────────────────────
  windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Install Python build dependencies
        run: pip install pandas

      - name: Build grocery database
        working-directory: app
        run: python3 scripts/build-grocery-db.py --force

      # Bundle a self-contained Python 3.12 runtime with all AI dependencies
      # pre-installed.  This is what gets shipped inside the .exe installer so
      # users don't need Python on their system and the first launch doesn't
      # have to download anything.
      #
      # Layout produced: app/src-tauri/python-runtime/
      #   ├── python.exe                 (10 MB, embeddable)
      #   ├── python312.dll, *.zip, ...
      #   ├── python312._pth             (with `import site` enabled)
      #   └── Lib/site-packages/         (paddleocr, paddlepaddle, llama-cpp-python, ...)
      - name: Bundle Python runtime + AI dependencies
        shell: pwsh
        working-directory: app/src-tauri
        run: |
          $ErrorActionPreference = "Stop"
          $ProgressPreference = "SilentlyContinue"
          $PythonVersion = "3.12.7"
          $EmbedUrl = "https://www.python.org/ftp/python/$PythonVersion/python-$PythonVersion-embed-amd64.zip"

          Write-Host "Downloading Python $PythonVersion embeddable runtime..."
          Invoke-WebRequest -Uri $EmbedUrl -OutFile python-embed.zip -UseBasicParsing
          if (Test-Path python-runtime) { Remove-Item -Recurse -Force python-runtime }
          Expand-Archive -Path python-embed.zip -DestinationPath python-runtime -Force
          Remove-Item python-embed.zip

          # Embeddable Python ships with `import site` commented out — uncomment
          # so pip and our deps end up on sys.path.
          $pthFile = Get-ChildItem -Path python-runtime -Filter "python*._pth" |
              Select-Object -First 1
          $content = Get-Content $pthFile.FullName
          $content = $content -replace '^\s*#\s*import\s+site', 'import site'
          Set-Content -Path $pthFile.FullName -Value $content

          Write-Host "Bootstrapping pip..."
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" `
              -OutFile get-pip.py -UseBasicParsing
          & .\python-runtime\python.exe get-pip.py --no-warn-script-location
          Remove-Item get-pip.py

          Write-Host "Installing AI dependencies (~500 MB)..."
          & .\python-runtime\python.exe -m pip install --upgrade pip
          if ($LASTEXITCODE -ne 0) { throw "pip upgrade failed (exit $LASTEXITCODE)" }

          # llama-cpp-python does NOT publish prebuilt wheels on PyPI; pip
          # falls back to a from-source build that needs scikit-build-core +
          # Visual Studio + CMake and fails on the runner with:
          #   BackendUnavailable: Cannot import 'scikit_build_core.build'
          # The project hosts CPU wheels on their own GitHub Pages index.
          # Two flags make pip actually use them:
          #   --extra-index-url <url>     adds the wheel index to the search
          #   --only-binary llama-cpp-python  refuses to fall back to sdist
          #                                   for this package even if pip
          #                                   thinks a newer sdist exists
          # Install it first so that the subsequent `-r requirements.txt`
          # pass treats the version constraint as already satisfied.
          Write-Host "  Installing llama-cpp-python from prebuilt CPU wheel..."
          & .\python-runtime\python.exe -m pip install `
              --only-binary llama-cpp-python `
              --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cpu `
              "llama-cpp-python>=0.3.0"
          if ($LASTEXITCODE -ne 0) { throw "llama-cpp-python wheel install failed (exit $LASTEXITCODE)" }

          Write-Host "  Installing remaining dependencies from PyPI..."
          & .\python-runtime\python.exe -m pip install -r ../data/requirements.txt
          if ($LASTEXITCODE -ne 0) { throw "pip install failed (exit $LASTEXITCODE)" }

          # Pre-compile bytecode so __pycache__ exists alongside .py files —
          # otherwise Python tries to write to Program Files at runtime, which
          # fails silently and slows every import.  -q keeps logs tidy; -f
          # forces rebuild even if a stale .pyc exists.
          Write-Host "Pre-compiling Python bytecode..."
          & .\python-runtime\python.exe -m compileall -q -f .\python-runtime\Lib

          Write-Host "Bundle size:"
          $size = (Get-ChildItem -Recurse python-runtime |
              Measure-Object -Property Length -Sum).Sum
          "{0:N0} MB" -f ($size / 1MB)

      - name: Build app
        working-directory: app
        run: npx tauri build
        env:
          PYTHON: python3

      - name: Stage release asset
        shell: bash
        run: cp app/src-tauri/target/release/bundle/nsis/*.exe Monioc-setup.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: Monioc-setup.exe

  # ── Linux (.AppImage) ────────────────────────────────────────────────────────
  linux:
    name: Build Linux
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Install Python build dependencies
        run: pip install pandas

      - name: Build grocery database
        working-directory: app
        run: python3 scripts/build-grocery-db.py --force

      - name: Build app
        working-directory: app
        run: npx tauri build

      - name: Stage release asset
        run: cp app/src-tauri/target/release/bundle/appimage/*.AppImage monioc.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: monioc.AppImage

  # ── Publish GitHub release ───────────────────────────────────────────────────
  publish:
    name: Publish release
    needs: [macos, windows, linux]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            Monioc.dmg
            Monioc-setup.exe
            monioc.AppImage
