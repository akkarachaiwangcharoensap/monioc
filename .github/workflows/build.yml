name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Windows installer (.msi / .exe) ─────────────────────────────────────────
  windows:
    name: Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Install Python build dependencies
        run: pip install pandas

      - name: Build grocery database
        working-directory: app
        run: python3 scripts/build-grocery-db.py --force

      - name: Build app
        working-directory: app
        run: npx tauri build
        env:
          # Point build-grocery-db.py fallback to the setup-python binary.
          PYTHON: python3

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: Monioc-windows
          path: |
            app/src-tauri/target/release/bundle/msi/*.msi
            app/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  # ── macOS app bundle (.dmg) ──────────────────────────────────────────────────
  macos:
    name: macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Install Python build dependencies
        run: pip install pandas

      - name: Build grocery database
        working-directory: app
        run: python3 scripts/build-grocery-db.py --force

      - name: Build app
        working-directory: app
        # Skip the full ML venv setup (runtime-only) — just build the bundle.
        run: npx tauri build

      - name: Upload macOS disk image
        uses: actions/upload-artifact@v4
        with:
          name: Monioc-macos
          path: app/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
